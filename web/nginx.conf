# ============================================================================
# NGINX Configuration for Local Development (https://localhost)
# ============================================================================
# This configuration handles:
# - HTTP to HTTPS redirection
# - SSL/TLS termination
# - Reverse proxy to CloudFront (static assets)
# - Reverse proxy to backend services (API, OAuth, Resource server)
# - WebSocket support for Socket.IO real-time communication
# ============================================================================

# User that nginx worker processes run as
user  nginx;

# Number of worker processes (auto = one per CPU core)
worker_processes auto;

# Error log location and level
error_log /var/log/nginx/error.log notice;

# PID file location
pid /var/run/nginx.pid;

# ============================================================================
# Events Block - Connection Processing Settings
# ============================================================================
events {
  # Maximum number of simultaneous connections per worker process
  worker_connections  1024;

  # Accept as many connections as possible after nginx gets notification about a new connection
  multi_accept on;

  # Use efficient event model for Linux
  use epoll;
}

# ============================================================================
# HTTP Block - Main Configuration
# ============================================================================
http {
  # Include MIME type definitions
  include /etc/nginx/mime.types;

  # Default MIME type for files without extension
  default_type application/octet-stream;

  # the Docker "Magic" IP
  # Docker runs a tiny DNS server inside the engine so that scontainers can talk to each other by name instead of IP.
  # That DNS server always lives at 127.0.0.11.
  # Disable IPv6 to prevent resolution delays/errors
  # valid=30s tells Nginx to re-query every 30 seconds
  resolver 127.0.0.11 ipv6=off valid=30s;

  # ============================================================================
  # Logging Configuration
  # ============================================================================
  # Define log format with client info, request details, and response status
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

  # Access log location and format
  access_log /var/log/nginx/access.log main;

  # ============================================================================
  # Performance Settings
  # ============================================================================
  # Use sendfile for efficient file transfers
  sendfile on;

  # Timeout for keep-alive connections
  keepalive_timeout  65;

  # Hide nginx version in headers for security
  server_tokens off;

  # Default character encoding
  charset UTF-8;

  # ============================================================================
  # WebSocket Upgrade Header Mapping
  # ============================================================================
  # Maps the $http_upgrade header to the proper Connection header value
  # This is needed for WebSocket connections to work properly
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ============================================================================
  # HTTP Server Block - Redirect to HTTPS
  # ============================================================================
  # This server block catches all HTTP (port 80) requests and redirects them
  # to HTTPS (port 443) to ensure secure connections
  # HTTP to HTTPS redirect
  server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
  }

  # ============================================================================
  # HTTPS Server Block - Main Application Server
  # ============================================================================
  server {
    # Listen on port 443 with SSL/TLS enabled
    listen 443 ssl;
    server_name localhost;

    # ========================================================================
    # SSL Certificate Configuration
    # ========================================================================
    # Path to SSL certificate (public key)
    ssl_certificate /etc/ssl/certs/cert.pem;

    # Path to full certificate chain (for proper SSL validation)
    ssl_trusted_certificate /etc/ssl/certs/fullchain.pem;

    # Path to private key (keep this secure!)
    ssl_certificate_key /etc/ssl/certs/privkey.pem;

    # ========================================================================
    # SSL/TLS Security Settings
    # ========================================================================
    # Only allow modern, secure TLS protocols (disable old SSL/TLS versions)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Use strong cipher suites, disable weak ones
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Prefer server's cipher preference order over client's
    ssl_prefer_server_ciphers on;

    # Cache SSL sessions to improve performance for returning clients
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ========================================================================
    # Security Headers
    # ========================================================================
    # HSTS: Force browsers to always use HTTPS for next 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Prevent site from being embedded in iframes (clickjacking protection)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable browser's XSS filter
    add_header X-XSS-Protection "1; mode=block" always;

    # ========================================================================
    # Location: /socket.io/ - Socket.IO WebSocket Connections
    # ========================================================================
    # CRITICAL: This location must come FIRST to match Socket.IO requests
    # Handles WebSocket connections for real-time features
    location /socket.io {
      set $backend_app tokyomap-app;

      # Forward to Node.js app container on port 80
      proxy_pass http://$backend_app:80;

      # Standard proxy headers
      proxy_set_header Host $host; # Pass original host header
      proxy_set_header X-Real-IP $remote_addr; # Pass real client IP to backend
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Pass all proxy IPs in the chain
      proxy_set_header X-Forwarded-Proto $scheme; # Tell backend the original protocol was HTTPS

      # ======================================================================
      # WebSocket Configuration
      # ======================================================================
      # Use HTTP/1.1 (required for WebSockets)
      proxy_http_version 1.1;

      # Pass WebSocket upgrade headers using the map variable
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # Disable buffering for real-time streaming
      proxy_buffering off;

      # Long timeout for WebSocket connections (24 hours)
      proxy_read_timeout 86400;
    }

    # ========================================================================
    # Location: /api - Backend API with WebSocket Support
    # ========================================================================
    # Proxies API requests to Node.js backend running in Docker container
    # Also handles Socket.IO WebSocket connections for real-time features
    location /api {
      set $backend_app tokyomap-app;

      # Remove /api prefix before forwarding to backend (e.g., /api/tweets -> /tweets)
      rewrite /api/(.*) /$1 break;

      # Forward to Node.js app container on port 80
      proxy_pass http://$backend_app:80;

      # Standard proxy headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # ======================================================================
      # WebSocket Support for Socket.IO
      # ======================================================================
      # Use HTTP/1.1 (required for WebSockets)
      proxy_http_version 1.1;

      # Pass WebSocket upgrade headers using the map variable
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # Disable buffering for real-time streaming
      proxy_buffering off;

      # Long timeout for WebSocket connections (24 hours)
      proxy_read_timeout 86400;
    }

    # ========================================================================
    # Location: /auth - OAuth Authentication Service
    # ========================================================================
    # Handles user authentication via OAuth (email login)
    location /auth {
      set $backend_oauth tokyomap-oauth;

      # Match the production rewrite
      rewrite /auth/(.*) /$1 break;

      # Forward to Java container on port 8080
      proxy_pass http://$backend_oauth:8080; 

      # THE LOOP KILLER: 
    # Production uses a real domain, so redirects work. 
    # On localhost, we must manually map the internal root back to the /auth prefix.
    proxy_redirect http://localhost/ /auth/;
    proxy_redirect http://tokyomap-oauth:8080/ /auth/;

      # Standard proxy headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header X-Forwarded-Port 443;
      proxy_set_header X-Forwarded-Prefix /auth;
    }

    # ========================================================================
    # Location: /resource - Resource Server
    # ========================================================================
    # Handles protected resources (user data, tweets, etc.)
    location /resource {
      set $backend_res tokyomap-resource;

      # Remove /resource prefix before forwarding
      rewrite /resource/(.*) /$1 break;

      # Forward to resource server container on port 8081
      proxy_pass http://$backend_res:8081;

      # Standard proxy headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================================================
    # Location: /assets/ - Static Assets
    # ========================================================================
    # Serves static files (CSS, JS, images, favicons) from CloudFront
    # IMPORTANT: Trailing slashes on both location and proxy_pass preserve full path
    location /assets/ {
      root /usr/share/nginx/html; # This points to where your 'public' is mounted
        try_files $uri =404;        # If the file isn't there, return 404, not index.html

        # Ensure correct MIME types are sent
        include /etc/nginx/mime.types;

        # Optional: Cache assets for 1 day in dev
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # ========================================================================
    # Location: / - Frontend Application
    # ========================================================================
    # Serves the React application (index.html and other frontend files)
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}
